<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube to MP3 Converter</title>
    <meta name="description" content="Fast, simple, and reliable conversion of YouTube videos to high-quality MP3 files with a single click.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    <main class="container">
        <div class="glass-card">
            <div class="header">
                <h1>YouTube <span class="gradient-text">MP3</span></h1>
                <p>유튜브 링크를 입력하면 빠르고 간편하게 고음질 MP3 파일로 변환해 드립니다.</p>
            </div>
            <form id="convert-form" class="convert-form">
                <div class="input-group">
                    <input type="url" id="youtube-url" placeholder="https://www.youtube.com/watch?v=..." required autocomplete="off">
                </div>
                <button type="submit" id="convert-btn">
                    <span class="btn-text">MP3로 변환</span>
                </button>
            </form>
            <div id="status-message" class="status-message hidden">
                <!-- Status messages will be injected here -->
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
